# リリース時にビルドして GitHub Releases に配布
# 使い方: タグを push するか、Actions から手動実行
name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-web/package-lock.json

      - name: Install & Build
        working-directory: nextjs-web
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXTAUTH_SECRET: build-placeholder-secret-32chars!!
          DISCORD_CLIENT_ID: 0
          DISCORD_CLIENT_SECRET: x
        run: |
          npm ci --legacy-peer-deps
          npx prisma generate
          npm run build

      - name: Create dist zip
        run: |
          zip -r gachaboard-dist.zip . \
            -x "node_modules/*" \
            -x "nextjs-web/node_modules/*" \
            -x "launcher/node_modules/*" \
            -x "launcher/dist/*" \
            -x ".env" \
            -x ".git/*" \
            -x ".cursor/*" \
            -x "config/Caddyfile" \
            -x "*.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gachaboard-dist
          path: gachaboard-dist.zip

  launcher-win:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Install & Build launcher (Windows exe)
        working-directory: launcher
        run: npm ci && npm run build:win

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-win
          path: launcher/dist/*.exe

  release:
    runs-on: ubuntu-latest
    needs: [build, launcher-win]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/gachaboard-dist.zip
            release-files/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
